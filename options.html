<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BrightStream Settings</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="options">
  <main>
    <h1>BrightStream Settings</h1>

    <section>
      <label for="mode">Whitelist mode</label>
      <select id="mode">
        <option value="strict">Strict (channel ID only)</option>
        <option value="lenient">Lenient (channel ID or handle)</option>
      </select>
    </section>

    <section>
      <label>
        <input type="checkbox" id="blockShorts" />
        Block Shorts completely
      </label>
      <label>
        <input type="checkbox" id="enforceWatchGuard" />
        Block non-whitelisted watch pages
      </label>
      <label>
        <input type="checkbox" id="whitelistSubscriptionsByDefault" />
        Treat subscription feed channels as whitelisted (recommended)
      </label>
    </section>

    <section>
      <label for="channelIds">Whitelisted channel IDs (one per line)</label>
      <textarea id="channelIds" rows="8" placeholder="UCxxxxxxxx"></textarea>
    </section>

    <section>
      <label for="handles">Whitelisted handles (one per line)</label>
      <textarea id="handles" rows="8" placeholder="@channelhandle"></textarea>
    </section>

    <section>
      <label>Per-channel daily limits (minutes)</label>
      <p class="muted">Leave blank for unlimited. Applies only to currently whitelisted channels.</p>
      <div class="inline-actions" id="subscriptionActions">
        <button id="refreshSubscriptionStatusBtn" type="button">Refresh subscription statuses</button>
        <button id="subscribeAllBtn" type="button">Subscribe all not subscribed</button>
        <button id="cancelSubscriptionRunBtn" type="button" hidden>Stop run</button>
      </div>
      <table id="rateLimitsTable">
        <thead>
          <tr>
            <th>Channel</th>
            <th>Daily minutes</th>
            <th>Subscription status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="rateLimitsBody"></tbody>
      </table>
      <p id="rateLimitsEmpty" class="muted" hidden>No whitelisted channels yet.</p>
    </section>

    <section class="inline-actions">
      <button id="saveBtn">Save</button>
      <button id="exportBtn">Export JSON</button>
      <button id="importBtn">Import JSON</button>
      <input type="file" id="importFile" accept="application/json" hidden />
    </section>

    <p id="status" aria-live="polite"></p>
  </main>
  <script src="options.js"></script>
</body>
</html>
